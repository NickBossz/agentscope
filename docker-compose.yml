name: agentscope

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentscope}
      POSTGRES_USER: ${POSTGRES_USER:-agentscope}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentscope}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.129.1
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./infrastructure/otel/collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "components"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
      target: development
    command: ["bun", "--cwd", "apps/api", "dev"]
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      APP_URL: ${APP_URL:-http://localhost:3000}
      API_URL: ${API_URL:-http://localhost:3001}
      DATABASE_URL: postgresql://${POSTGRES_USER:-agentscope}:${POSTGRES_PASSWORD:-agentscope}@postgres:5432/${POSTGRES_DB:-agentscope}
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET:-development-auth-secret-change-before-production}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-604800}
      TRACE_ENCRYPTION_KEY: ${TRACE_ENCRYPTION_KEY:-development-encryption-key-change-before-production}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: agentscope-api
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
      target: development
    command: ["bun", "--cwd", "apps/worker", "dev"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-agentscope}:${POSTGRES_PASSWORD:-agentscope}@postgres:5432/${POSTGRES_DB:-agentscope}
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: agentscope-worker
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
      target: development
    command: ["bun", "--cwd", "apps/web", "dev"]
    env_file:
      - path: .env
        required: false
    environment:
      API_URL: http://api:3001
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
      target: development
    command: ["bun", "run", "db:migrate"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-agentscope}:${POSTGRES_PASSWORD:-agentscope}@postgres:5432/${POSTGRES_DB:-agentscope}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  postgres-data:
  redis-data:
